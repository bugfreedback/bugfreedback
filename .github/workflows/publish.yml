name: publish

on:
  release:
    types: [published]

permissions:
  contents: read
  # Required for npm Trusted Publishing (OIDC) — no NPM_TOKEN secret.
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v4
        with:
          # Trusted publishing needs Node >= 22.14 and npm >= 11.5.1
          node-version: 24
          registry-url: https://registry.npmjs.org
          # Do not cache package manager state on release builds
          cache: npm

      - name: Ensure npm CLI supports trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Prepare and build
        run: |
          npm run dev:prepare
          npm run prepack

      - name: Set package version from release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      # Auth is OIDC via Trusted Publishing — do not set NODE_AUTH_TOKEN / NPM_TOKEN.
      # Provenance is generated automatically when publishing via trusted publishers.
      - name: Publish to npm
        run: npm publish --access public

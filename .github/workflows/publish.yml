name: publish

on:
  # Human-created releases (gh release create) trigger this workflow.
  # release-please bot releases do NOT — see release-please.yml publish job.
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish (e.g. v0.0.5 or bugfreedback-v0.0.5)
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing from tag: $TAG"

      - uses: actions/checkout@v4
        with:
          lfs: true
          ref: ${{ steps.tag.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Ensure npm CLI supports trusted publishing
        run: npm install -g npm@latest

      - name: Publish to npm
        run: bash .github/scripts/npm-publish.sh "${{ steps.tag.outputs.tag }}"

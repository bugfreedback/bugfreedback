name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
          package-name: '@bugfreedback/bugfreedback'
          # Authors never hand-bump package.json; release-please opens the Release PR.
          skip-github-release: false

name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  # npm Trusted Publishing is registered for publish.yml only. Dispatch that
  # workflow instead of publishing inline here (inline publish gets E404).
  trigger-publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          RAW='${{ needs.release-please.outputs.tag_name }}'
          if echo "$RAW" | jq -e . >/dev/null 2>&1; then
            TAG="$(echo "$RAW" | jq -r 'if type == "array" then .[0] else . end')"
          else
            TAG="$RAW"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG"

      - name: Dispatch publish.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run publish.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f "tag=${{ steps.tag.outputs.tag }}"

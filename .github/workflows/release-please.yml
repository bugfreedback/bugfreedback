name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  # release-please creates GitHub Releases with GITHUB_TOKEN, which does NOT
  # trigger other workflows (including publish.yml). Publish in this workflow
  # when release-please creates a release in the same run.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          RAW='${{ needs.release-please.outputs.tag_name }}'
          if echo "$RAW" | jq -e . >/dev/null 2>&1; then
            TAG="$(echo "$RAW" | jq -r 'if type == "array" then .[0] else . end')"
          else
            TAG="$RAW"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG"

      - uses: actions/checkout@v4
        with:
          lfs: true
          ref: ${{ steps.tag.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Ensure npm CLI supports trusted publishing
        run: npm install -g npm@latest

      - name: Publish to npm
        run: bash .github/scripts/npm-publish.sh "${{ steps.tag.outputs.tag }}"
